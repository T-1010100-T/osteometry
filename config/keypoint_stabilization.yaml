# 关键点稳定配置
# CycleFitting 关键点滤波参数

# ============================================
# 基础配置
# ============================================
stabilizer:
  # 采样频率（Hz）
  freq: 30.0
  
  # 启用开关
  enable_2d_stabilization: true
  enable_3d_stabilization: true

# ============================================
# 2D 滤波参数（像素坐标）
# ============================================
filter_2d:
  # 最小截止频率（Hz）- 静止时的平滑强度
  # 值越小，平滑越强
  mincutoff: 1.0
  
  # 速度系数 - 控制运动时截止频率的增加速度
  # 值越大，运动时平滑越弱（响应越快）
  beta: 0.05
  
  # 导数截止频率（Hz）- 用于平滑速度估计
  dcutoff: 1.0

# ============================================
# 3D 滤波参数（米坐标）
# 通常需要更强的滤波
# ============================================
filter_3d:
  mincutoff: 0.5
  beta: 0.1
  dcutoff: 1.0

# ============================================
# 置信度阈值
# ============================================
confidence:
  # 低于此值不更新滤波器，使用历史值
  low_threshold: 0.3
  
  # 低于此值增强滤波
  medium_threshold: 0.6

# ============================================
# 异常值检测
# ============================================
outlier_detection:
  # 最大 2D 跳变（像素）
  max_jump_2d: 50.0
  
  # 最大 3D 跳变（米）
  max_jump_3d: 0.1
  
  # 历史缓冲区大小
  history_size: 5

# ============================================
# 预设配置
# ============================================
# 可选预设: default, smooth, responsive, minimal
# 
# default: 平衡平滑和响应
# smooth: 强平滑，适合静态测量
# responsive: 快速响应，适合动态跟踪
# minimal: 几乎不滤波

# ============================================
# 环境变量覆盖
# ============================================
# MEAS_KEYPOINT_STABILIZATION=true/false - 启用/禁用关键点稳定
