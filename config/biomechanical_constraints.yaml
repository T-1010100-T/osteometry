# 生物力学约束配置
# CycleFitting 人体比例和对称性验证参数

# ============================================
# 基础配置
# ============================================
constraints:
  # 比例约束
  enable_proportion_check: true
  proportion_tolerance: 0.1  # 允许超出范围 10%
  
  # 对称性约束
  enable_symmetry_check: true
  symmetry_threshold: 0.08  # 8% 差异阈值

# ============================================
# 身高范围（米）
# ============================================
height:
  min: 1.4
  max: 2.2

# ============================================
# 人体比例约束
# 骨骼长度 / 身高 的合理范围
# 格式: [最小比例, 典型比例, 最大比例]
# ============================================
proportions:
  # 上肢
  upper_arm: [0.15, 0.175, 0.20]    # 上臂
  forearm: [0.13, 0.15, 0.17]       # 前臂
  hand: [0.09, 0.105, 0.12]         # 手
  
  # 下肢
  thigh: [0.23, 0.26, 0.28]         # 大腿
  shin: [0.22, 0.245, 0.28]         # 小腿
  foot: [0.13, 0.15, 0.17]          # 脚
  
  # 躯干
  torso: [0.28, 0.30, 0.33]         # 躯干（肩到髋）
  spine_lower: [0.08, 0.10, 0.12]   # 下脊柱
  spine_upper: [0.10, 0.12, 0.14]   # 上脊柱
  shoulder_width: [0.20, 0.23, 0.26]  # 肩宽
  hip_width: [0.14, 0.16, 0.18]     # 髋宽

# ============================================
# 对称骨骼对
# ============================================
symmetric_pairs:
  - left: "左肩到左肘"
    right: "右肩到右肘"
    category: "上臂"
  - left: "左肘到左腕"
    right: "右肘到右腕"
    category: "前臂"
  - left: "左腕到左手"
    right: "右腕到右手"
    category: "手"
  - left: "左髋到左膝"
    right: "右髋到右膝"
    category: "大腿"
  - left: "左膝到左踝"
    right: "右膝到右踝"
    category: "小腿"
  - left: "左踝到左脚"
    right: "右踝到右脚"
    category: "脚"

# ============================================
# 环境变量覆盖
# ============================================
# MEAS_BIOMECHANICAL_CONSTRAINTS=true/false - 启用/禁用生物力学约束
